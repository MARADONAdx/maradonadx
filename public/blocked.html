<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Blocked — MARADONAvx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050508;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 50%, rgba(120, 40, 200, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 10;
      animation: fadeIn 0.8s ease forwards;
    }

    .icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #a855f7, #ec4899, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 300;
      max-width: 400px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2.5rem;
      border-radius: 50px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 50px rgba(168, 85, 247, 0.6);
    }

    .code {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">🚫</span>
    <h1>Access Blocked</h1>
    <p>This action is not permitted on this site. Inspection and source viewing are disabled.</p>
    <a href="/" class="btn">← Go Back Home</a>
    <p class="code">MARADONAvx · Security Layer Active</p>
  </div>
</body>
</html>
